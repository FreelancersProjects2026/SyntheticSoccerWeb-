<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#072f1a"/>
  <!-- field outline -->
  <rect x="5" y="8" width="22" height="16" rx="1" stroke="#12D176" stroke-width="1.2" fill="none"/>
  <!-- center line -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="#12D176" stroke-width="1.2"/>
  <!-- center circle -->
  <circle cx="16" cy="16" r="3.5" stroke="#12D176" stroke-width="1.2" fill="none"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="0.8" fill="#12D176"/>
  <!-- left penalty box -->
  <rect x="5" y="11.5" width="5" height="9" stroke="#12D176" stroke-width="1.2" fill="none"/>
  <!-- right penalty box -->
  <rect x="22" y="11.5" width="5" height="9" stroke="#12D176" stroke-width="1.2" fill="none"/>
</svg>
